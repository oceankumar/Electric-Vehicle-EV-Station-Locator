<!DOCTYPE html>
<html lang="en">
<head>
  <title>EV Station Locator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>EV Charging Stations</h1>

  <!-- Loader -->
  <div id="loader">Loading...</div>

<input type="text" id="search" placeholder="Search stations..." />

<select id="filter">
  <option value="all">All</option>
  <option value="low">Connections < 2</option>
  <option value="high">Connections ≥ 2</option>
</select>

<select id="sort">
  <option value="default">Sort</option>
  <option value="az">A → Z</option>
  <option value="za">Z → A</option>
</select>

  <!-- Data container -->
  <div id="stations"></div>

  <script src="script.js"></script>
</body>
</html>
